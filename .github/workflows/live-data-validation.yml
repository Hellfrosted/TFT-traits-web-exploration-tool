name: Live Data Validation

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  validate-live-data:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Community Dragon data sources
        run: npm run validate:data
