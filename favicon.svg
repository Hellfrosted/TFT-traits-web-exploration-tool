<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Background: Deep teal fading to glowy cyan at the bottom -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0b1b2d" />
      <stop offset="60%" stop-color="#0d5c75" />
      <stop offset="100%" stop-color="#00e5ff" />
    </linearGradient>
    <!-- Border: Bright light gold to deep bronze/gold -->
    <linearGradient id="border" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fdfaeb" />
      <stop offset="30%" stop-color="#fde047" />
      <stop offset="100%" stop-color="#92400e" />
    </linearGradient>
  </defs>
  
  <!-- Outer Hexagon mimicking the TFT gold frame -->
  <polygon points="50,5 90,28 90,72 50,95 10,72 10,28" fill="url(#bg)" stroke="url(#border)" stroke-width="8" stroke-linejoin="round" />
  
  <!-- Synergy Network Lines (glowy cyan to match the inner hex pattern of the logo) -->
  <line x1="50" y1="15" x2="50" y2="50" stroke="#00e5ff" stroke-width="4" stroke-linecap="round" opacity="0.8" />
  <line x1="20" y1="67" x2="50" y2="50" stroke="#00e5ff" stroke-width="4" stroke-linecap="round" opacity="0.8" />
  <line x1="80" y1="67" x2="50" y2="50" stroke="#00e5ff" stroke-width="4" stroke-linecap="round" opacity="0.8" />
  
  <!-- Trait Nodes -->
  <circle cx="50" cy="50" r="8" fill="#ffffff" />
  <circle cx="50" cy="15" r="6" fill="#cffafe" />
  <circle cx="20" cy="67" r="6" fill="#cffafe" />
  <circle cx="80" cy="67" r="6" fill="#cffafe" />
</svg>
